const PARAGRAPHS = [
{ type: 'h1', text: 'Breaking Into Data Analytics' },
{ type: 'h2', text: 'Start where you already are' },
{ type: 'p', text: "A lot of people think they need a new job title before they can start working with data. That's not true. The fastest path into the field is usually inside the job you already have." },
{ type: 'p', text: "If your current role gives you access to any kind of data, even messy spreadsheets or basic reports, that's your starting point. Volunteer to build a simple report. Ask if you can dig into a recurring problem your team faces. Most managers are happy to hand off a task nobody else wants, and that task can become your first real experience." },
{ type: 'p', text: "This approach works because it removes the biggest barrier in a career change: the lack of a track record. You don't need permission to start; you need a reason your manager can say yes to." },
{ type: 'h2', text: 'Build a learning plan that matches your target role' },
{ type: 'p', text: "Data is a broad field. Before you commit to a course or a certification, get clear on which role you're actually aiming for. A data analyst, a data engineer, and a data scientist do very different work day to day, even though job postings often blur the lines between them." },
{ type: 'p', text: "Once you've picked a direction, study the job descriptions for that role. Notice which tools keep showing up, which skills are listed as required versus nice to have, and what kind of interview process companies use. This turns a vague goal into a concrete checklist." },
{ type: 'p', text: "Don't skip the soft skills. Being able to ask the right questions, explain a finding clearly, and push back on a vague request are just as valuable as knowing SQL. Technical skills get you in the door, but communication skills are often what separates a junior hire from someone who keeps getting promoted." },
{ type: 'h2', text: 'Practice until you can prove it' },
{ type: 'p', text: "Knowing a tool and being able to apply it under pressure are two different things. The gap between \"I took a course\" and \"I can solve this problem\" is where most people get stuck." },
{ type: 'p', text: "Two things close that gap. The first is structured practice: working through realistic exercises that force you to combine several skills at once, the way a real job would. The second is building your own projects from scratch. Pick a dataset, define a clear question you want to answer, and walk through the full process: cleaning the data, analyzing it, and presenting what you found as if you were reporting to a stakeholder." },
{ type: 'p', text: "A finished project does more than teach you a skill. It gives you something concrete to talk about in an interview, and it shows initiative that a certificate alone cannot." },
{ type: 'h2', text: 'Make your work visible' },
{ type: 'p', text: "Once you've built something worth showing, don't let it sit on your laptop. Update your resume and your LinkedIn profile every time you finish a project or learn a new tool. Waiting until you feel \"ready enough\" usually means waiting too long." },
